<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Demo | AI LeadGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        .container { text-align: center; padding: 2rem; max-width: 600px; }
        h1 { font-family: 'Outfit', sans-serif; margin-bottom: 2rem; }
        .instructions { color: #94a3b8; line-height: 1.6; margin-bottom: 3rem; }
        
        /* The Widget Container */
        #chat-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        #chat-button {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            transition: transform 0.3s;
        }

        #chat-button:hover { transform: scale(1.1); }

        #chat-window {
            display: none;
            width: 380px;
            height: 600px;
            background: #1e293b;
            border-radius: 20px;
            position: absolute;
            bottom: 80px;
            right: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 480px) {
            #chat-window {
                width: 90vw;
                height: 80vh;
                right: -10px;
            }
        }

        header { padding: 1.5rem; background: #334155; display: flex; align-items: center; gap: 1rem; }
        header .status { width: 10px; height: 10px; background: #10b981; border-radius: 50%; }
        
        #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { padding: 0.75rem 1rem; border-radius: 12px; max-width: 80%; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--primary); }
        .bot { align-self: flex-start; background: #334155; }

        .input-area { padding: 1rem; display: flex; gap: 0.5rem; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; padding: 0.75rem; border-radius: 10px; border: none; background: #1e293b; color: white; outline: none; }
        button { padding: 0.75rem 1.25rem; background: var(--primary); border: none; border-radius: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Live Demo</h1>
        <p class="instructions">Interact with our AI chatbot in the bottom right corner. Try asking about our services, pricing, or how we can help your business. Notice how it naturally asks for your details!</p>
        <a href="index.html" style="color: #6366f1; text-decoration: none;">&larr; Back to Home</a>
    </div>

    <!-- Live Chat Widget -->
    <div id="chat-widget-container">
        <div id="chat-window">
            <header>
                <div class="status"></div>
                <strong>AI LeadGen Agent</strong>
            </header>
            <div id="messages">
                <!-- Messages will be added here -->
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        <div id="chat-button" onclick="toggleChat()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </div>
    </div>

    <script>
        let conversationId = null;

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            try {
                // For demo purposes, we'll use a hardcoded clientId or the first one in DB
                const response = await fetch('/api/chat/default-client', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, conversationId })
                });
                const data = await response.json();
                addMessage(data.message, 'bot');
                conversationId = data.conversationId;
            } catch (e) {
                addMessage("Sorry, I'm having trouble connecting right now.", 'bot');
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            const container = document.getElementById('messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Handle enter key
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
